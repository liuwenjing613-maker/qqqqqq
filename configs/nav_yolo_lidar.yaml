mode: yolo_lidar_nav
instruction: "find the bottle"

image_topic: /image_raw
scan_topic: /scan
cmd_topic: /cmd_vel
target_bbox_topic: /target_bbox_json
target_words_topic: /target_words
state_topic: /nav_state
point_topic: /nav_target_point

target_words:
  - bottle

topics:
  image_raw: /image_raw
  scan: /scan
  cmd_vel: /cmd_vel
  target_bbox_json: /target_bbox_json
  target_words: /target_words
  nav_state: /nav_state
  nav_target_point: /nav_target_point

camera:
  device: /dev/video0
  compressed_topic: /image
  width: 640
  height: 480
  image_raw_max_fps: 8

yolo_world:
  enabled: false

yolov5s_bpu:
  enabled: true
  model: /root/rdk_model_zoo/samples/vision/yolov5/model/yolov5s_tag_v7.0_detect_640x640_bayese_nv12.bin
  runtime_dir: /root/rdk_model_zoo/samples/vision/yolov5/runtime/python
  zoo_root: /root/rdk_model_zoo
  input_type: raw
  image_topic: /image_raw
  out_topic: /target_bbox_json
  target_words_topic: /target_words
  target_classes: bottle
  score_threshold: 0.2
  nms_threshold: 0.45
  max_hz: 10.0

yolo_bridge:
  enabled: false
  out_topic: /target_bbox_json
  target_classes: bottle
  min_score: 0.2
  max_area_ratio: 0.30
  voter_window_size: 1
  voter_min_votes: 1
  voter_lost_hold_frames: 0

target:
  source: yolo_bbox
  words: ["bottle"]
  classes: ["bottle"]
  min_score: 0.2
  min_area_ratio: 0.0008
  max_area_ratio: 0.30
  accept_unknown_class: false
  accept_stale: false

voter:
  enabled: false
  window_size: 1
  min_votes: 1
  lost_hold_frames: 0
  iou_threshold: 0.05
  smooth_alpha: 0.20

fsm:
  stable_frames_required: 3
  lost_frames_limit: 5
  centered_required_frames: 3
  max_search_sec: 45
  max_task_sec: 0
  min_state_frames: 2

success:
  require_lidar: true
  center_px: 70
  min_distance: 0.6
  max_distance: 0.7
  min_area_ratio: 0.16
  center_only_enabled: false
  arrive_frames: 2
  verify_frames: 2
  qwen_verify_required: false

servo:
  max_vx: 0.06
  steer_vx: 0.04
  max_wz: 0.06
  kp_turn: 0.12
  center_deadband: 0.06
  turn_only_threshold: 0.35
  turn_only_vx: 0.04
  cmd_wz_deadband: 0.006

safety:
  require_lidar: true
  emergency_stop_distance: 0.25
  hard_stop_distance: 0.35
  slow_distance: 0.90
  max_cmd_vx: 0.06
  max_cmd_wz: 0.06
  turn_zero_vx_wz: 0.05
  turn_slow_vx_wz: 0.035
  turn_slow_vx_scale: 0.5

search:
  scan_wz: 0.04
  pulse_sec: 0.20
  observe_sec: 0.60
  free_space_enabled: false
  free_space_enable_after_sec: 10.0
  free_space_vx: 0.015
  free_space_min_clearance: 1.0

freshness:
  image_stale_sec: 0.40
  scan_stale_sec: 0.30
  bbox_stale_sec: 0.45

rates:
  decision_hz: 10
  control_hz: 20
  state_pub_hz: 5

chassis:
  bridge: pwm
  port: /dev/ttyUSB1
  max_vx: 0.06
  max_wz: 0.06
  watchdog_timeout: 0.5
  control_rate_hz: 20.0
  wheel_layout: fl-rl-fr-rr
  motor_signs: "1,1,1,1"
  vx_pwm_deadband: 6.0
  wz_pwm_deadband: 8.0
  pwm_max: 30.0
  vx_pwm_gain: 180.0
  wz_pwm_gain: 120.0
  pwm_smooth_alpha: 0.35
  max_pwm_delta: 3.0
  debug: true
