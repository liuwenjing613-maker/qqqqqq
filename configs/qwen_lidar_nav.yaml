# Qwen-only + LiDAR navigation config.
# 不启动 YOLO-World，只用 Qwen 低频输出 u/v，再由独立点视觉伺服 + 雷达安全层控制小车。

model: "qwen2.5vl:3b"

image_topic: "/image_raw"
scan_topic: "/scan"
#cmd_topic: "/cmd_vel"

cmd_topic: "/cmd_vel_debug"
qwen_json_topic: "/qwen_nav_json"
state_topic: "/qwen_lidar_state"

# 初始值，运行时会被真实 frame.shape 自动覆盖
image_width: 640
image_height: 480

# 你的最新 benchmark 稳定配置：约 7.5~8.5s，JSON 完整
qwen_resize_width: 192
qwen_jpeg_quality: 45
qwen_coord_mode: "norm1000"
qwen_num_predict: 16
qwen_num_ctx: 256
qwen_keep_alive: -1
min_confidence: 0.0

# warmup 可以慢；正式推理不能卡 900 秒
qwen_timeout_sec: 300.0
qwen_warmup_timeout_sec: 900.0
qwen_warmup_on_first_frame: true
recover_on_timeout: true
recover_script: "/root/rdk_x5_vln_robot/scripts/ollama_recover.sh"
timeout_backoff_sec: 8.0

# Qwen 单次推理已经 7~8 秒，不要额外等太久
qwen_interval_sec: 0.3

# 真车先保守，别拿小车给 bug 做路演
max_vx: 0.030
mid_vx: 0.022
slow_vx: 0.014
min_vx: 0.010

max_wz: 0.050
kp_turn: 0.11
wz_deadzone: 0.07
cmd_wz_deadzone: 0.012
turn_threshold: 0.24
forward_turn_scale: 0.45

# 短 burst 执行：动一下，停下观察，再问 Qwen
servo_burst_sec: 0.22
observe_stop_sec: 0.45

# Qwen 返回 null 时小角度扫描
scan_wz: 0.045
scan_burst_sec: 0.18
scan_observe_sec: 0.55
lost_scan_max: 8

# 雷达安全层：没有新鲜雷达不允许前进
require_lidar: true
max_scan_age_sec: 1.5
lidar_wait_backoff_sec: 1.0
lidar_min_range: 0.08
lidar_max_range: 6.0
lidar_front_deg: 18.0
lidar_target_window_deg: 8.0
camera_hfov_deg: 70.0
camera_lidar_yaw_offset_deg: 0.0

# 安全距离，单位 m
emergency_stop_distance: 0.22
hard_stop_distance: 0.32
slow_distance: 0.55
normal_distance: 0.90
arrive_distance: 0.38

# 到达判定：居中 + 距离近 + 至少前进过几次
center_arrive_px: 70
arrive_required_count: 3
min_forward_bursts_before_arrive: 2

max_steps: 80
debug_dir: "data/images/qwen_lidar_debug"
save_debug: false
