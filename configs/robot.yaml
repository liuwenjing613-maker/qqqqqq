robot:
  compressed_image_topic: "/image"
  raw_image_topic: "/image_raw"
  cmd_topic: "/cmd_vel"
  detection_topic: "/hobot_yolo_world"
  target_words_topic: "/target_words"
  target_words: "backpack,handbag,suitcase"

camera:
  device: "/dev/video0"
  width: 1280
  height: 720
  compressed_for_web: true
  raw_for_algorithm: true

lidar:
  device: "/dev/ydlidar"
  scan_topic: "/scan"
  frame_id: "laser"
  baudrate: 230400
  params_file: "lidar/config/tmini_plus.yaml"

chassis:
  port: "/dev/rosmaster"
  use_lateral: false
  max_vx: 0.04
  max_wz: 0.22
  watchdog_timeout: 0.5

servo:
  kp_turn: 0.1
  center_threshold: 0.18
  arrive_area_ratio: 0.12
  min_area_ratio: 0.002
  lost_timeout: 0.6

mvp:
  default_instruction: "find the red backpack"
  default_backend: "yolo_world"
