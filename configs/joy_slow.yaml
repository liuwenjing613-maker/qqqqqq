teleop_twist_joy_node:
  ros__parameters:
    require_enable_button: true
    enable_button: 4
    enable_turbo_button: 5

    axis_linear:
      x: 1
    scale_linear:
      x: 0.10
    scale_linear_turbo:
      x: 0.10

    axis_angular:
      yaw: 0
    scale_angular:
      yaw: 0.20
    scale_angular_turbo:
      yaw: 0.35
