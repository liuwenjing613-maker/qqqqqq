model: "qwen2.5vl:3b"

image_topic: "/image_raw"
cmd_topic: "/cmd_vel"
qwen_json_topic: "/qwen_nav_json"

image_width: 1280
image_height: 720
qwen_resize_width: 192
qwen_coord_mode: "norm1000"
qwen_interval_sec: 240.0
qwen_timeout_sec: 900.0
qwen_keep_alive: "1h"

# Qwen 判定
target_lock_conf: 0.45

# verify 辅助触发（非最终成功；最终 success 只看 VLM status=success）
verify_v_min: 520
verify_u_center_px: 80
verify_min_forward_bursts: 3

# 点视觉伺服（仅 u 横向）
max_vx: 0.035
max_wz: 0.045
kp_turn: 0.09
wz_deadzone: 0.08
turn_threshold: 0.28
forward_turn_scale: 0.45
cmd_wz_deadzone: 0.012

# 执行方式：短步，不连续狂奔
servo_burst_sec: 0.25
observe_stop_sec: 0.45

# 搜索
scan_wz: 0.040
scan_burst_sec: 0.18
scan_observe_sec: 0.50
