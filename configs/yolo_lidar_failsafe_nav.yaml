# P0 YOLO / YOLO-World + LiDAR failsafe navigation — 唯一主配置文件
# 相机 / YOLO / bbox bridge / 底盘 / 导航 / Foxglove 均由此文件驱动。
# 启动: bash scripts/nav/start_yolo_lidar_failsafe_nav.sh [本文件] [instruction覆盖]
# 稳定版: bash scripts/nav/start_yolo_lidar_stable_nav.sh

# ===== Topics =====
image_topic: "/image_raw"
scan_topic: "/scan"
cmd_topic: "/cmd_vel"

target_bbox_topic: "/target_bbox_json"
target_words_topic: "/target_words"

state_topic: "/failsafe_nav_state"
point_topic: "/failsafe_nav_point"

# ===== Foxglove visualization =====
viz_frame_id: "laser"
viz_markers_topic: "/failsafe_nav/markers"
viz_debug_image_topic: "/failsafe_nav/debug_image"
viz_rate_hz: 5.0
viz_image_source: "compressed"
viz_image_topic: "/image"
viz_image_max_fps: 15.0
viz_image_scale: 0.5

# ===== Image geometry =====
camera_width: 640
camera_height: 480
image_width: 640
image_height: 480

camera_hfov_deg: 70.0
camera_lidar_yaw_offset_deg: 0.0

# ===== Target words =====
instruction: "bottle"

target_words:
  - "bottle"
  - "water bottle"
  - "cup"

context_words:
  - "table"
  - "desk"
  - "shelf"

publish_target_words: true
target_words_publish_period_sec: 3.0

# ===== Target parser =====
target_min_score: 0.008
target_stable_frames: 1
target_lost_timeout_sec: 0.8
target_memory_sec: 1.5
accept_unknown_class: true

bbox_min_area_ratio: 0.0005
bbox_max_area_ratio: 0.24
bbox_edge_margin_px: 4

# ===== Camera / image pipeline =====
camera:
  device: "/dev/video0"
  compressed_topic: "/image"
  image_raw_max_fps: 2.0

# ===== YOLO-World node (hobot_yolo_world) =====
yolo_world:
  det_topic: "/hobot_yolo_world"
  image_topic: "/image_raw"
  score_threshold: 0.002
  iou_threshold: 0.45
  feed_type: 1

# ===== YOLO bridge (yolo_world_to_bbox_json.py) =====
yolo_bridge:
  det_topic: "/hobot_yolo_world"
  out_topic: "/target_bbox_json"
  image_topic: "/image_raw"
  target_classes: "bottle,cup"
  min_score: 0.008
  max_area_ratio: 0.24
  min_red_ratio: 0.06
  require_red_verify: false
  sync_max_delta_sec: 0.5
  publish_rate_hz: 10.0
  voter_window_size: 10
  voter_min_votes: 3
  voter_lost_hold_frames: 3
  voter_iou_threshold: 0.20
  voter_center_dist_threshold: 0.18
  voter_smooth_alpha: 0.65

# ===== Chassis bridge (cmd_vel_to_rosmaster.py) =====
chassis:
  port: "/dev/ttyUSB0"
  max_vx: 0.06
  max_wz: 0.24
  watchdog_timeout: 0.8
  enable_kick_start: true
  kick_vx: 0.06
  kick_wz: 0.24
  kick_duration: 0.25
  kick_cooldown: 0.45
  cmd_wz_deadzone: 0.012
  cmd_smooth_alpha: 0.0
  max_vx_delta: 0.07
  max_wz_delta: 0.25
  control_rate_hz: 30.0
  reset_on_zero: false
  zero_reset_hold_sec: 0.4
  debug: true

# ===== LiDAR basic =====
lidar_min_range: 0.08
lidar_max_range: 6.0
lidar_front_deg: 25.0
lidar_target_window_deg: 8.0

# ===== LiDAR freshness =====
max_scan_age_sec: 1.0
front_distance_hold_sec: 0.5
scan_stale_nav_grace_sec: 1.2
bad_wp_limit: 3

# ===== Safety distances, m =====
emergency_stop_distance: 0.35
hard_stop_distance: 0.45
slow_distance: 0.70
normal_distance: 1.2
arrive_distance: 0.38

# ===== Responsive but stable control timing =====
# decision 8Hz ≈ 125ms 反应；control 30Hz 持续下发；cmd_hold 略大于决策周期避免空档
control_rate_hz: 30.0
decision_rate_hz: 8.0
cmd_hold_sec: 0.40
stop_on_cmd_expire: true
cmd_publish_immediate: true

# 探索要慢速(≈0.01)时：min_drive_vx 勿大于 explore_vx，且 vx_deadband 必须严格小于 explore_vx
min_drive_vx: 0.01
min_turn_wz: 0.12
vx_deadband: 0.005
wz_deadband: 0.015

# ===== Target visual servo =====
target_max_vx: 0.03
target_mid_vx: 0.04
target_slow_vx: 0.025
target_min_vx: 0.02

target_kp_turn: 0.1
target_max_wz: 0.20
target_wz_deadzone: 0.02
target_cmd_wz_deadzone: 0.02
target_turn_threshold: 0.18
target_forward_turn_scale: 0.45

target_reacquire_wz: 0.18
target_reacquire_hold_sec: 0.35
target_lost_to_explore_sec: 1.5

# ===== Free-space waypoint =====
free_space_enabled: true
free_space_sector_deg: 70.0
free_space_step_deg: 5.0
free_space_window_deg: 10.0
free_space_min_clearance: 0.45
free_space_good_clearance: 1.20
free_space_center_prefer_deg: 12.0
free_space_smooth_alpha: 0.22

free_space_waypoint_v_ratio: 0.62
free_space_min_u_ratio: 0.20
free_space_max_u_ratio: 0.80

free_space_clearance_weight: 0.60
free_space_center_weight: 0.30
free_space_consistency_weight: 0.10

# ===== Explore control =====
explore_vx: 0.005
explore_slow_vx: 0.004
explore_kp_turn: 0.1
explore_max_wz: 0.15
explore_turn_only_threshold: 0.18
explore_forward_turn_scale: 0.45

# 旧 burst 参数保留兼容，控制环不再使用
target_burst_sec: 0.80
target_observe_sec: 0.05
explore_burst_sec: 0.80
explore_observe_sec: 0.05

# ===== Blocked / scan recovery =====
scan_wz: 0.24
blocked_rotate_wz: 0.18
blocked_rotate_hold_sec: 1.2
blocked_rotate_min_switch_sec: 1.2
scan_burst_sec: 0.80
scan_observe_sec: 0.05
blocked_rotate_alternate: true
blocked_front_distance: 0.40

# ===== Arrive =====
center_arrive_px: 80
arrive_required_count: 3
min_forward_bursts_before_arrive: 2

# ===== FSM =====
min_state_frames: 3
bad_wp_grace_frames: 2
no_target_grace_frames: 2

# ===== Runtime =====
max_steps: 1500
save_debug: true
debug_dir: "data/images/yolo_lidar_failsafe_debug"
