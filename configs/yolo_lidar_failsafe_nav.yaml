# P0 YOLO / YOLO-World + LiDAR failsafe navigation — 唯一主配置文件
# 相机 / YOLO / bbox bridge / 底盘 / 导航 / Foxglove 均由此文件驱动。
# 启动: bash scripts/nav/start_yolo_lidar_failsafe_nav.sh [本文件] [instruction覆盖]
# 板端临时覆盖: CAMERA_DEV=/dev/video1 CHASSIS_PORT=/dev/ttyUSB0 bash scripts/nav/...

# ===== Topics =====
image_topic: "/image_raw"
scan_topic: "/scan"
cmd_topic: "/cmd_vel"

target_bbox_topic: "/target_bbox_json"
target_words_topic: "/target_words"

state_topic: "/failsafe_nav_state"
point_topic: "/failsafe_nav_point"

# ===== Foxglove visualization =====
viz_frame_id: "laser"
viz_markers_topic: "/failsafe_nav/markers"
viz_debug_image_topic: "/failsafe_nav/debug_image"
viz_rate_hz: 5.0
# Low-latency camera: subscribe /image (MJPEG) directly, publish on frame (not /image_raw @ 2fps)
viz_image_source: "compressed"   # compressed | raw
viz_image_topic: "/image"
viz_image_max_fps: 15.0
viz_image_scale: 0.5              # downscale for Foxglove bandwidth (1.0 = full res)

# ===== Image geometry =====
camera_width: 640
camera_height: 480
image_width: 640
image_height: 480

camera_hfov_deg: 70.0
camera_lidar_yaw_offset_deg: 0.0

# ===== Target words (aligned with start_yolo_live_preview.sh) =====
instruction: "bottle"

target_words:
  - "bottle"
  - "water bottle"
  - "cup"

context_words:
  - "table"
  - "desk"
  - "shelf"

publish_target_words: true
target_words_publish_period_sec: 3.0

# ===== Target parser =====
target_min_score: 0.008
target_stable_frames: 1
target_lost_timeout_sec: 0.8
target_memory_sec: 1.5
accept_unknown_class: true

bbox_min_area_ratio: 0.0005
bbox_max_area_ratio: 0.24
bbox_edge_margin_px: 4

# ===== Camera / image pipeline =====
camera:
  device: "/dev/video0"
  compressed_topic: "/image"
  image_raw_max_fps: 2.0

# ===== YOLO-World node (hobot_yolo_world) =====
yolo_world:
  det_topic: "/hobot_yolo_world"
  image_topic: "/image_raw"
  score_threshold: 0.002
  iou_threshold: 0.45
  feed_type: 1

# ===== YOLO bridge (yolo_world_to_bbox_json.py) =====
yolo_bridge:
  det_topic: "/hobot_yolo_world"
  out_topic: "/target_bbox_json"
  image_topic: "/image_raw"
  target_classes: "bottle,cup"
  min_score: 0.002
  max_area_ratio: 0.24
  min_red_ratio: 0.06
  require_red_verify: false
  sync_max_delta_sec: 0.5
  publish_rate_hz: 10.0
  voter_window_size: 10
  voter_min_votes: 3
  voter_lost_hold_frames: 3
  voter_iou_threshold: 0.20
  voter_center_dist_threshold: 0.18
  voter_smooth_alpha: 0.65

# ===== Chassis bridge (cmd_vel_to_rosmaster.py) =====
chassis:
  port: "/dev/ttyUSB0"
  max_vx: 0.08
  max_wz: 0.35
  watchdog_timeout: 0.5
  enable_kick_start: true
  kick_vx: 0.055
  kick_wz: 0.240
  kick_duration: 0.045
  kick_cooldown: 0.55
  cmd_wz_deadzone: 0.012
  cmd_smooth_alpha: 0.55
  max_vx_delta: 0.010
  max_wz_delta: 0.008
  control_rate_hz: 20.0

# ===== LiDAR basic =====
lidar_min_range: 0.08
lidar_max_range: 6.0
lidar_front_deg: 25.0
lidar_target_window_deg: 8.0

# ===== Safety distances, m =====
emergency_stop_distance: 0.35
hard_stop_distance: 0.45
slow_distance: 0.70
normal_distance: 1.2
arrive_distance: 0.38

# ===== Target visual servo =====
target_max_vx: 0.045
target_mid_vx: 0.035
target_slow_vx: 0.020
target_min_vx: 0.012

target_kp_turn: 0.22
target_max_wz: 0.14
target_wz_deadzone: 0.06
target_cmd_wz_deadzone: 0.015
target_turn_threshold: 0.20
target_forward_turn_scale: 0.45

# ===== Free-space waypoint =====
free_space_enabled: true
free_space_sector_deg: 70.0
free_space_step_deg: 5.0
free_space_window_deg: 10.0
free_space_min_clearance: 0.45
free_space_good_clearance: 1.20
free_space_center_prefer_deg: 12.0
free_space_smooth_alpha: 0.35

free_space_waypoint_v_ratio: 0.62
free_space_min_u_ratio: 0.20
free_space_max_u_ratio: 0.80

free_space_clearance_weight: 0.60
free_space_center_weight: 0.30
free_space_consistency_weight: 0.10

# ===== Explore control =====
explore_vx: 0.040
explore_slow_vx: 0.020
explore_kp_turn: 0.20
explore_max_wz: 0.12
explore_turn_only_threshold: 0.22
explore_forward_turn_scale: 0.55

target_burst_sec: 0.25
target_observe_sec: 0.20
explore_burst_sec: 0.30
explore_observe_sec: 0.10

# ===== Blocked / scan recovery =====
scan_wz: 0.12
scan_burst_sec: 0.25
scan_observe_sec: 0.20
blocked_rotate_alternate: true
blocked_front_distance: 0.35

# ===== Arrive =====
center_arrive_px: 80
arrive_required_count: 3
min_forward_bursts_before_arrive: 2

# ===== FSM =====
min_state_frames: 10

# ===== Runtime =====
control_rate_hz: 20.0
decision_rate_hz: 5.0
max_steps: 1500
save_debug: true
debug_dir: "data/images/yolo_lidar_failsafe_debug"
