# P0 YOLO / YOLO-World + LiDAR failsafe navigation — 唯一主配置文件
# 分层: Sensor -> Safety 20Hz -> Behavior/Planner 5Hz -> Controller 20Hz -> Chassis

# ===== Topics =====
image_topic: "/image_raw"
scan_topic: "/scan"
cmd_topic: "/cmd_vel"

target_bbox_topic: "/target_bbox_json"
target_words_topic: "/target_words"

state_topic: "/failsafe_nav_state"
point_topic: "/failsafe_nav_point"

# ===== Foxglove visualization =====
# passthrough: 直接转发 /image MJPEG，延迟最低（无检测框）
# compressed:  解码后叠框，再 JPEG 压缩发出（推荐）
viz_frame_id: "laser"
viz_markers_topic: "/failsafe_nav/markers"
viz_debug_image_topic: "/failsafe_nav/debug_image"
viz_debug_compressed_topic: "/failsafe_nav/debug_image/compressed"
viz_rate_hz: 10.0
viz_image_source: "compressed"
viz_image_topic: "/image"
viz_image_max_fps: 15.0
viz_image_max_width: 640
viz_image_scale: 1.0
viz_publish_format: "jpeg"
viz_jpeg_quality: 80
viz_use_wall_stamp: true

# ===== Image geometry =====
camera_width: 640
camera_height: 480
image_width: 640
image_height: 480

camera_hfov_deg: 70.0
camera_lidar_yaw_offset_deg: 0.0

# ===== Target words =====
instruction: "cup"

target_words:
  - "cup"

context_words:
  - "table"
  - "desk"
  - "shelf"

publish_target_words: true
target_words_publish_period_sec: 3.0

# ===== Target parser =====
target_min_score: 0.001
target_stable_frames: 2
target_lost_timeout_sec: 0.35
target_memory_sec: 1.0
accept_unknown_class: false

bbox_min_area_ratio: 0.0005
bbox_max_area_ratio: 0.40
bbox_edge_margin_px: 4

# ===== Camera / image pipeline =====
camera:
  device: "/dev/video0"
  compressed_topic: "/image"
  image_raw_max_fps: 15.0

# ===== YOLO-World node (hobot_yolo_world) =====
yolo_world:
  det_topic: "/hobot_yolo_world"
  image_topic: "/image_raw"
  score_threshold: 0.003
  iou_threshold: 0.45
  feed_type: 1

# ===== YOLO bridge (yolo_world_to_bbox_json.py) =====
yolo_bridge:
  det_topic: "/hobot_yolo_world"
  out_topic: "/target_bbox_json"
  image_topic: "/image_raw"
  target_classes: "cup"
  min_score: 0.001
  max_area_ratio: 0.40
  min_red_ratio: 0.06
  require_red_verify: false
  sync_max_delta_sec: 0.12
  publish_rate_hz: 15.0
  voter_window_size: 5
  voter_min_votes: 2
  voter_lost_hold_frames: 2
  voter_iou_threshold: 0.20
  voter_center_dist_threshold: 0.18
  voter_smooth_alpha: 0.65

# ===== Chassis bridge (m1_pwm_cmd_vel_bridge.py — open-loop PWM)
chassis:
  bridge: pwm
  port: "/dev/ttyUSB0"
  max_vx: 0.1
  max_wz: 0.1
  watchdog_timeout: 0.5
  control_rate_hz: 20.0
  wheel_layout: fl-rl-fr-rr
  motor_signs: "1,1,1,1"
  vx_pwm_deadband: 6.0
  wz_pwm_deadband: 8.0
  pwm_max: 30.0
  vx_pwm_gain: 180.0
  wz_pwm_gain: 120.0
  pwm_smooth_alpha: 0.35
  max_pwm_delta: 3.0
  debug: true

# ===== LiDAR basic =====
lidar_min_range: 0.08
lidar_max_range: 6.0
lidar_front_deg: 25.0
lidar_target_window_deg: 8.0

# ===== LiDAR freshness (Safety Layer) =====
max_scan_age_sec: 0.35
front_distance_hold_sec: 0.0
bad_wp_limit: 3

# ===== Safety distances, m — 使用 front_min (min 扇区) =====
emergency_stop_distance: 0.45
hard_stop_distance: 0.55
slow_distance: 0.90
normal_distance: 1.2
arrive_distance: 0.6

# ===== Layer timing =====
control_rate_hz: 20.0
decision_rate_hz: 15.0

# ===== Controller limits =====
max_cmd_vx: 0.1
max_cmd_wz: 0.1
wz_slow_vx_threshold: 0.04
wz_zero_vx_threshold: 0.06
wz_slow_vx_scale: 0.5

min_drive_vx: 0.05
min_turn_wz: 0.05
vx_deadband: 0.005
wz_deadband: 0.015

# ===== Target visual servo (Behavior / Planner) =====
target_max_vx: 0.10
target_mid_vx: 0.08
target_slow_vx: 0.06
target_min_vx: 0.05

target_kp_turn: 0.10
target_max_wz: 0.06
target_wz_deadzone: 0.02
target_cmd_wz_deadzone: 0.02
target_turn_threshold: 0.18
target_forward_turn_scale: 0.45

target_reacquire_wz: 0.06
target_lost_to_explore_sec: 1.5

# ===== Free-space waypoint (Local Planner) =====
free_space_enabled: true
free_space_sector_deg: 70.0
free_space_step_deg: 5.0
free_space_window_deg: 10.0
free_space_min_clearance: 0.45
free_space_good_clearance: 1.20
free_space_center_prefer_deg: 12.0
free_space_smooth_alpha: 0.22

free_space_waypoint_v_ratio: 0.62
free_space_min_u_ratio: 0.20
free_space_max_u_ratio: 0.80

free_space_clearance_weight: 0.60
free_space_center_weight: 0.30
free_space_consistency_weight: 0.10

# ===== Explore control =====
explore_vx: 0.06
explore_slow_vx: 0.04
explore_kp_turn: 0.10
explore_max_wz: 0.06
explore_turn_only_threshold: 0.18
explore_forward_turn_scale: 0.45

# ===== Blocked recovery =====
scan_wz: 0.06
blocked_rotate_wz: 0.06
recovery_side_deg: 45.0
blocked_front_distance: 0.40

# ===== Success (到达判定) =====
# 成功条件：目标在视野内 + 目标方向雷达距离 <= success_distance
success_distance: 0.6
arrive_distance: 0.6
arrive_required_count: 2
lidar_target_window_deg: 8.0
exit_on_success: true
success_shutdown_delay_sec: 0.5

# ===== FSM =====
min_state_frames: 1
bad_wp_grace_frames: 2
no_target_grace_frames: 2

# ===== Runtime =====
max_steps: 1500
save_debug: true
debug_dir: "data/images/yolo_lidar_failsafe_debug"
